name: Build and Push Backend Image

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'
      - 'v*'

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag commit belongs to main
        id: validate_tag
        shell: bash
        run: |
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git fetch origin main --depth=1

          if git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "is_main_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${GITHUB_REF_NAME} does not belong to main. Skipping image push."
            echo "is_main_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.validate_tag.outputs.is_main_tag == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.validate_tag.outputs.is_main_tag == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: steps.validate_tag.outputs.is_main_tag == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            perazzojoao/sj-americas:${{ github.ref_name }}
            perazzojoao/sj-americas:latest

      - name: Trigger Coolify deploy
        if: steps.validate_tag.outputs.is_main_tag == 'true' && success()
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: ${{ secrets.COOLIFY_SECRET }}" \
            "https://coolify.perazzojoao.online/api/v1/deploy?uuid=fs4gsgw4c0gkwkkwosggowk0&force=false"
